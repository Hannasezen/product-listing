name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint & Test
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - run: npm install
      - run: npx nx run-many --target=lint --all
      - run: npx nx run-many --target=test --all --coverage

  build-api:
    needs: lint-and-test
    runs-on: ubuntu-latest
    name: Build API Docker Image
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          tags: product-listing-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate-database:
    needs: lint-and-test
    runs-on: ubuntu-latest
    environment: staging
    name: Database Migration
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - run: npm install
      - name: Run migrations (Staging)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          PGSSLMODE: 'require'
        run: |
          echo "Checking DATABASE_URL is set..."
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL_STAGING secret is not configured"
            exit 1
          fi
          npx tsx libs/db/src/migrate.ts

  seed-database:
    needs: migrate-database
    runs-on: ubuntu-latest
    environment: staging
    name: Seed Database
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install
      - name: Seed database (Staging)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_STAGING }}
          PGSSLMODE: 'require'
        run: |
          echo "Checking DATABASE_URL is set..."
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL_STAGING secret is not configured"
            exit 1
          fi
          npx tsx libs/db/src/seed.ts

  deploy-staging:
    needs: [lint-and-test, build-api]
    runs-on: ubuntu-latest
    environment: staging
    name: Deploy to Fly.io (Staging)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy API to Fly.io (Staging)
        uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Deploy
        run: |
          flyctl deploy --remote-only --config apps/api/fly.toml --dockerfile apps/api/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_STAGING }}
          FLY_APP: ${{ secrets.FLY_APP_STAGING }}

  deploy-production:
    needs: [lint-and-test, build-api]
    runs-on: ubuntu-latest
    environment: production
    name: Deploy to Fly.io (Production)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy API to Fly.io (Production)
        uses: superfly/flyctl-actions/setup-flyctl@master
      
      - name: Deploy
        run: |
          flyctl deploy --remote-only --config apps/api/fly.toml --dockerfile apps/api/Dockerfile
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN_PRODUCTION }}
          FLY_APP: ${{ secrets.FLY_APP_PRODUCTION }}

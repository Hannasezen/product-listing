# fly.toml app configuration file generated

app = "product-listing-api-staging"
primary_region = "dfw"

[build]
dockerfile = "Dockerfile"
docker_build_target = "runtime"

[env]
NODE_ENV = "production"

[http_service]
internal_port = 3001
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[services]]
protocol = "tcp"
internal_port = 3001

[[services.ports]]
port = 80
handlers = ["http"]

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[checks]
  [checks.status]
    type = "http"
    interval = "10s"
    timeout = "5s"
    grace_period = "5s"
    method = "GET"
    path = "/health"
